<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taskly - A stunning mobile-first to-do list app with Firebase sync">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Taskly">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
  <title>Taskly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; }
    
    .main-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }
    @media (min-width: 768px) {
      .main-container { box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    }

    @keyframes slide-up {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .sheet-enter { animation: slide-up 0.3s ease-out; }
    .overlay-enter { animation: fade-in 0.2s ease-out; }
    
    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 24px 24px 0 0; max-height: 90vh; overflow-y: auto; z-index: 40; }
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; }
    
    .tab-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tab-scroll::-webkit-scrollbar { display: none; }
    
    button, input, select, textarea { min-height: 44px; }
    button:focus, input:focus, select:focus, textarea:focus { outline: 2px solid #4f46e5; outline-offset: 2px; }
    
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .left-border-overdue { border-left: 4px solid #ef4444; }
    .left-border-today { border-left: 4px solid #f59e0b; }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white sticky top-0 z-50 px-4 py-3">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">Taskly</h1>
        <div class="flex items-center gap-2">
          <div id="user-info" class="flex items-center gap-2" style="display: none;">
            <img id="user-pic" class="w-8 h-8 rounded-full" src="" alt="">
            <button id="sign-out" class="text-sm px-3 py-1 hover:opacity-80 transition font-medium">Sign out</button>
          </div>
          <button id="sign-in" class="bg-white text-indigo-600 px-4 py-2 rounded-full font-semibold text-sm hover:opacity-90 transition">Sign in</button>
        </div>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="w-full h-1 bg-gray-200">
      <div id="progress-bar" class="h-1 bg-indigo-600 w-0 transition-all duration-500"></div>
    </div>

    <!-- Motivation -->
    <div id="motivation" class="text-center py-2 text-xs text-indigo-600 font-semibold hidden">📊 Loading...</div>

    <!-- Tab Bar -->
    <div class="bg-indigo-700 text-white px-4 py-3 sticky top-0 z-40">
      <div class="tab-scroll flex gap-2">
        <button class="tab-btn active px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap bg-white text-indigo-600 transition" data-filter="all">All <span class="text-xs bg-indigo-100 text-indigo-600 ml-1 px-2 py-0.5 rounded inline" id="count-all">0</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap text-white hover:bg-indigo-600 transition" data-filter="today">☀️ Today <span class="text-xs bg-indigo-600 text-white ml-1 px-2 py-0.5 rounded inline" id="count-today">0</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap text-white hover:bg-indigo-600 transition" data-filter="starred">⭐ Starred <span class="text-xs bg-indigo-600 text-white ml-1 px-2 py-0.5 rounded inline" id="count-starred">0</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap text-white hover:bg-indigo-600 transition" data-filter="completed">✅ Done <span class="text-xs bg-indigo-600 text-white ml-1 px-2 py-0.5 rounded inline" id="count-completed">0</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap text-white hover:bg-indigo-600 transition" data-filter="overdue">🔴 Overdue <span class="text-xs bg-indigo-600 text-white ml-1 px-2 py-0.5 rounded inline" id="count-overdue">0</span></button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="px-4 py-4">
      <input type="text" id="search-input" placeholder="🔍 Search..." class="w-full rounded-full border border-gray-300 px-4 py-3 text-sm placeholder-gray-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition shadow-sm">
    </div>

    <!-- Bulk Actions -->
    <div id="bulk-actions" class="hidden px-4 pb-4 flex gap-2">
      <button id="complete-all" class="flex-1 bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-semibold hover:bg-indigo-700 transition">✅ Complete All</button>
      <button id="clear-completed" class="flex-1 bg-red-600 text-white px-3 py-2 rounded-lg text-xs font-semibold hover:bg-red-700 transition">🗑️ Clear</button>
    </div>

    <!-- Sort -->
    <div class="px-4 pb-2 flex justify-end">
      <select id="sort" class="px-3 py-2 border border-gray-300 rounded-lg text-xs font-medium focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200">
        <option value="newest">Newest</option>
        <option value="dueDate">Due Date</option>
        <option value="priority">Priority</option>
        <option value="alpha">A-Z</option>
      </select>
    </div>

    <!-- Task List -->
    <div id="task-list" class="px-4 pb-24 space-y-3"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-12">
      <p class="text-5xl mb-4">📝</p>
      <p class="text-gray-600 font-medium">No tasks yet</p>
      <p class="text-sm text-gray-500 mt-1">Tap the + button to add one!</p>
    </div>
  </div>

  <!-- Floating Add Button -->
  <button id="add-btn" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 transition flex items-center justify-center text-3xl z-20 min-h-0 min-w-0">➕</button>

  <!-- Bottom Sheet Overlay -->
  <div id="sheet-overlay" class="sheet-overlay hidden" style="display: none;"></div>

  <!-- Bottom Sheet Modal -->
  <div id="bottom-sheet" class="bottom-sheet hidden" style="display: none;">
    <div class="p-4 border-b border-gray-200 flex justify-between items-center sticky top-0 bg-white rounded-t-3xl">
      <h2 class="text-xl font-bold text-gray-900">Add Task</h2>
      <button id="sheet-close" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">✕</button>
    </div>

    <form id="add-form" class="p-4 space-y-4">
      <!-- Task Title -->
      <div>
        <input type="text" id="form-text" placeholder="What do you need to do?" required class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base placeholder-gray-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 font-semibold">
      </div>

      <!-- Notes -->
      <div>
        <textarea id="form-notes" placeholder="Add notes..." rows="2" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm placeholder-gray-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 resize-none"></textarea>
      </div>

      <!-- Category (Horizontal Scroll) -->
      <div>
        <p class="text-xs font-semibold text-gray-700 mb-2">Category</p>
        <div class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4">
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Work">💼 Work</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Personal">🏠 Personal</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Shopping">🛒 Shopping</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Health">❤️ Health</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Study">📚 Study</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Finance">💰 Finance</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Travel">✈️ Travel</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Fitness">🏋️ Fitness</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Family">👨‍👩‍👧 Family</button>
          <button type="button" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300" data-cat="Goals">🎯 Goals</button>
        </div>
        <input type="hidden" id="form-category" value="Work">
      </div>

      <!-- Due Date -->
      <div>
        <label class="text-xs font-semibold text-gray-700 block mb-2">Due Date</label>
        <input type="date" id="form-due" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200">
      </div>

      <!-- Priority (3 Big Pill Buttons) -->
      <div>
        <p class="text-xs font-semibold text-gray-700 mb-2">Priority</p>
        <div class="grid grid-cols-3 gap-2">
          <button type="button" class="pri-btn px-3 py-3 rounded-xl text-sm font-semibold border-2 border-green-500 text-green-700 hover:bg-green-50 transition" data-pri="low">🟢 Low</button>
          <button type="button" class="pri-btn px-3 py-3 rounded-xl text-sm font-semibold border-2 border-gray-300 text-gray-700 hover:bg-gray-50 transition" data-pri="medium">🟡 Medium</button>
          <button type="button" class="pri-btn px-3 py-3 rounded-xl text-sm font-semibold border-2 border-gray-300 text-gray-700 hover:bg-gray-50 transition" data-pri="high">🔴 High</button>
        </div>
        <input type="hidden" id="form-priority" value="low">
      </div>

      <!-- Add Button -->
      <button type="submit" class="w-full bg-indigo-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition mt-4">Add Task</button>
    </form>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyALBhEKZDpih5cYgvOiOqFswDSh-VKPP3k",
      authDomain: "todo-app-b16da.firebaseapp.com",
      projectId: "todo-app-b16da",
      storageBucket: "todo-app-b16da.firebasestorage.app",
      messagingSenderId: "576296289477",
      appId: "1:576296289477:web:8c9b0b3d009f3624cedcac"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    window.addEventListener('load', async () => {
      try {
        const result = await auth.getRedirectResult();
        if (result && result.user) {
          console.log('Signed in:', result.user.email);
        }
      } catch(err) {
        console.error('Redirect result error:', err.code, err.message);
        if (err.code !== 'auth/no-current-user' && 
            err.code !== 'auth/null-user') {
          showToast('Sign-in error: ' + err.message, 'error');
        }
      }
    });

    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    db.enablePersistence().catch(err => console.warn('Persistence error:', err));

    // Handle redirect result - FIXED FOR SAFARI
    window.addEventListener('load', () => {
      auth.getRedirectResult().then(result => {
        if(result && result.user) {
          console.log('Redirect sign in success');
        }
      }).catch(err => {
        console.log('No redirect result');
      });
    });

    // DOM Elements
    const signInBtn = document.getElementById('sign-in');
    const signOutBtn = document.getElementById('sign-out');
    const userInfo = document.getElementById('user-info');
    const userPic = document.getElementById('user-pic');
    const addBtn = document.getElementById('add-btn');
    const sheetOverlay = document.getElementById('sheet-overlay');
    const bottomSheet = document.getElementById('bottom-sheet');
    const sheetClose = document.getElementById('sheet-close');
    const addForm = document.getElementById('add-form');
    const taskList = document.getElementById('task-list');
    const emptyState = document.getElementById('empty-state');
    const searchInput = document.getElementById('search-input');
    const sortSelect = document.getElementById('sort');
    const bulkActionsDiv = document.getElementById('bulk-actions');
    const completeAllBtn = document.getElementById('complete-all');
    const clearCompletedBtn = document.getElementById('clear-completed');
    const progressBar = document.getElementById('progress-bar');
    const motivationText = document.getElementById('motivation');
    const formText = document.getElementById('form-text');
    const formNotes = document.getElementById('form-notes');
    const formCategory = document.getElementById('form-category');
    const formDue = document.getElementById('form-due');
    const formPriority = document.getElementById('form-priority');

    let allTasks = [];
    let tasksRef;
    let currentFilter = 'all';
    let currentSort = 'newest';
    let selectedCategory = 'Work';
    let selectedPriority = 'low';

    // Utility Functions
    function sanitize(text) {
      return text.replace(/<[^>]*>/g, '').trim();
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 right-4 bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold z-50 shadow-lg';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function openSheet() {
      sheetOverlay.style.display = 'block';
      bottomSheet.style.display = 'block';
      setTimeout(() => {
        sheetOverlay.classList.add('overlay-enter');
        bottomSheet.classList.add('sheet-enter');
        formText.focus();
      }, 0);
    }

    function closeSheet() {
      sheetOverlay.classList.remove('overlay-enter');
      bottomSheet.classList.remove('sheet-enter');
      setTimeout(() => {
        sheetOverlay.style.display = 'none';
        bottomSheet.style.display = 'none';
      }, 300);
    }

    // Event Listeners
    addBtn.addEventListener('click', openSheet);
    sheetClose.addEventListener('click', closeSheet);
    sheetOverlay.addEventListener('click', closeSheet);

    // Sign In - POPUP FIRST, REDIRECT FALLBACK
    signInBtn.addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      
      try {
        // Try popup first (works better with sessionStorage)
        await auth.signInWithPopup(provider);
      } catch (err) {
        console.log('Popup failed:', err.code);
        
        // Fallback to redirect if popup blocked/unavailable
        if (err.code === 'auth/popup-blocked' || 
            err.code === 'auth/popup-closed-by-user' ||
            err.code === 'auth/cancelled-popup-request') {
          try {
            await auth.signInWithRedirect(provider);
          } catch (redirectErr) {
            if (redirectErr.code === 'auth/operation-not-supported-in-this-environment') {
              showToast('Sign-in unavailable in private browsing. Try normal mode.', 'error');
            } else {
              showToast('Sign-in failed: ' + redirectErr.message, 'error');
            }
          }
        } else {
          showToast('Sign-in failed: ' + err.message, 'error');
        }
      }
    });

    signOutBtn.addEventListener('click', () => auth.signOut());

    // Auth State
    auth.onAuthStateChanged(user => {
      if(user) {
        signInBtn.classList.add('hidden');
        userInfo.style.display = 'flex';
        userPic.src = user.photoURL || '';
        tasksRef = db.collection('users').doc(user.uid).collection('tasks');
        
        tasksRef.onSnapshot(snapshot => {
          allTasks = [];
          snapshot.forEach(doc => {
            allTasks.push({ id: doc.id, ...doc.data() });
          });
          renderTasks();
        });
      } else {
        signInBtn.classList.remove('hidden');
        userInfo.style.display = 'none';
        taskList.innerHTML = '';
        allTasks = [];
      }
    });

    // Add Task
    addForm.addEventListener('submit', async e => {
      e.preventDefault();
      if(!tasksRef) return;

      const text = sanitize(formText.value);
      if(!text) {
        showToast('Please enter a task title');
        return;
      }

      try {
        await tasksRef.add({
          text: text,
          notes: sanitize(formNotes.value),
          category: selectedCategory,
          priority: selectedPriority,
          due: formDue.value || null,
          completed: false,
          starred: false,
          created: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        formText.value = '';
        formNotes.value = '';
        formDue.value = '';
        selectedCategory = 'Work';
        selectedPriority = 'low';
        formCategory.value = 'Work';
        formPriority.value = 'low';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
        document.querySelectorAll('.cat-btn')[0].classList.add('bg-indigo-600', 'text-white');
        document.querySelectorAll('.pri-btn').forEach(b => b.classList.remove('border-green-500', 'text-green-700', 'bg-green-50'));
        document.querySelectorAll('.pri-btn')[0].classList.add('border-green-500', 'text-green-700');
        
        closeSheet();
        showToast('Task added! ✅');
      } catch (error) {
        showToast('Failed to add task');
        console.error(error);
      }
    });

    // Category Selection
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
        btn.classList.add('bg-indigo-600', 'text-white');
        selectedCategory = btn.dataset.cat;
        formCategory.value = selectedCategory;
      });
    });

    // Priority Selection
    document.querySelectorAll('.pri-btn').forEach((btn, idx) => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.pri-btn').forEach((b, i) => {
          if(i === 0) b.classList.remove('border-green-500', 'text-green-700', 'bg-green-50');
          else if(i === 1) b.classList.remove('border-amber-500', 'text-amber-700', 'bg-amber-50');
          else b.classList.remove('border-red-500', 'text-red-700', 'bg-red-50');
          b.classList.add('border-gray-300', 'text-gray-700');
        });
        
        if(idx === 0) btn.classList.add('border-green-500', 'text-green-700');
        else if(idx === 1) btn.classList.add('border-amber-500', 'text-amber-700');
        else btn.classList.add('border-red-500', 'text-red-700');
        btn.classList.remove('border-gray-300', 'text-gray-700');
        
        selectedPriority = btn.dataset.pri;
        formPriority.value = selectedPriority;
      });
    });

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('bg-white', 'text-indigo-600');
          b.classList.add('text-white', 'hover:bg-indigo-600');
        });
        btn.classList.add('bg-white', 'text-indigo-600');
        btn.classList.remove('text-white', 'hover:bg-indigo-600');
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });

    // Search
    searchInput.addEventListener('input', () => renderTasks());

    // Sort
    sortSelect.addEventListener('change', (e) => {
      currentSort = e.target.value;
      renderTasks();
    });

    // Bulk Actions
    completeAllBtn.addEventListener('click', async () => {
      const filtered = getFilteredTasks();
      try {
        const batch = db.batch();
        filtered.forEach(t => batch.update(tasksRef.doc(t.id), { completed: true }));
        await batch.commit();
        showToast(`Completed ${filtered.length} task${filtered.length === 1 ? '' : 's'}!`);
      } catch (err) {
        showToast('Error completing tasks');
      }
    });

    clearCompletedBtn.addEventListener('click', async () => {
      const filtered = getFilteredTasks().filter(t => t.completed);
      if(!confirm(`Delete ${filtered.length} task${filtered.length === 1 ? '' : 's'}?`)) return;
      try {
        const batch = db.batch();
        filtered.forEach(t => batch.delete(tasksRef.doc(t.id)));
        await batch.commit();
        showToast('Tasks removed');
      } catch (err) {
        showToast('Error removing tasks');
      }
    });

    // Utility Functions
    function getToday() {
      const d = new Date();
      return d.toISOString().split('T')[0];
    }

    function isToday(dateStr) {
      return dateStr === getToday();
    }

    function isOverdue(dateStr, completed) {
      if(!dateStr || completed) return false;
      return dateStr < getToday();
    }

    function getFilteredTasks() {
      let filtered = [...allTasks];
      const searchTerm = searchInput.value.toLowerCase();
      
      if(searchTerm) {
        filtered = filtered.filter(t => 
          t.text.toLowerCase().includes(searchTerm) || 
          (t.notes && t.notes.toLowerCase().includes(searchTerm))
        );
      }

      if(currentFilter === 'today') {
        filtered = filtered.filter(t => !t.completed && t.due && isToday(t.due));
      } else if(currentFilter === 'starred') {
        filtered = filtered.filter(t => t.starred);
      } else if(currentFilter === 'completed') {
        filtered = filtered.filter(t => t.completed);
      } else if(currentFilter === 'overdue') {
        filtered = filtered.filter(t => isOverdue(t.due, t.completed));
      }

      return filtered;
    }

    function getSortedTasks(tasks) {
      const sorted = [...tasks];
      
      if(currentSort === 'dueDate') {
        sorted.sort((a, b) => {
          const aDate = a.due || '9999-12-31';
          const bDate = b.due || '9999-12-31';
          return aDate.localeCompare(bDate);
        });
      } else if(currentSort === 'priority') {
        const order = { high: 0, medium: 1, low: 2 };
        sorted.sort((a, b) => order[a.priority] - order[b.priority]);
      } else if(currentSort === 'alpha') {
        sorted.sort((a, b) => a.text.localeCompare(b.text));
      } else if(currentSort === 'newest') {
        sorted.sort((a, b) => (b.created?.seconds || 0) - (a.created?.seconds || 0));
      }

      return sorted;
    }

    function updateCounts() {
      const completed = allTasks.filter(t => t.completed).length;
      const today = allTasks.filter(t => !t.completed && t.due && isToday(t.due)).length;
      const starred = allTasks.filter(t => t.starred).length;
      const overdue = allTasks.filter(t => isOverdue(t.due, t.completed)).length;
      const total = allTasks.length;

      document.getElementById('count-all').textContent = total;
      document.getElementById('count-today').textContent = today;
      document.getElementById('count-starred').textContent = starred;
      document.getElementById('count-completed').textContent = completed;
      document.getElementById('count-overdue').textContent = overdue;

      const pct = total ? Math.round((completed / total) * 100) : 0;
      progressBar.style.width = pct + '%';

      if(pct === 100 && total > 0) {
        motivationText.textContent = '🎉 Perfect! All done!';
        motivationText.classList.remove('hidden');
      } else if(pct >= 75) {
        motivationText.textContent = '🔥 Almost there!';
        motivationText.classList.remove('hidden');
      } else if(pct >= 50) {
        motivationText.textContent = '💪 Halfway done!';
        motivationText.classList.remove('hidden');
      } else if(pct > 0) {
        motivationText.textContent = '🚀 Great start!';
        motivationText.classList.remove('hidden');
      } else {
        motivationText.classList.add('hidden');
      }
    }

    function renderTasks() {
      taskList.innerHTML = '';
      updateCounts();

      const filtered = getFilteredTasks();
      const sorted = getSortedTasks(filtered);

      const hasCompleted = filtered.some(t => t.completed);
      const hasIncomplete = filtered.some(t => !t.completed);
      bulkActionsDiv.classList.toggle('hidden', !(hasCompleted && hasIncomplete));

      if(sorted.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }
      emptyState.classList.add('hidden');

      sorted.forEach(t => {
        const priEmoji = t.priority === 'high' ? '🔴' : t.priority === 'medium' ? '🟡' : '🟢';
        let borderClass = '';
        
        if(isOverdue(t.due, t.completed)) {
          borderClass = 'left-border-overdue';
        } else if(!t.completed && t.due && isToday(t.due)) {
          borderClass = 'left-border-today';
        }

        const card = document.createElement('div');
        card.className = `bg-white rounded-2xl shadow-sm p-4 ${borderClass} transition hover:shadow-md`;

        card.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <p class="font-bold text-gray-900 flex-1 ${t.completed ? 'line-through opacity-50' : ''}">${t.text}</p>
            <button class="star-btn text-2xl hover:scale-125 transition ml-2" data-id="${t.id}" style="min-height: auto; min-width: auto;">
              ${t.starred ? '⭐' : '☆'}
            </button>
          </div>
          
          <div class="flex items-center gap-2 mb-3 text-xs text-gray-600">
            <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-semibold">${t.category}</span>
            ${t.due ? `<span>📅 ${t.due}</span>` : '<span>📅 No date</span>'}
            <span>${priEmoji}</span>
          </div>

          <div class="flex gap-2">
            <button class="complete-btn flex-1 ${t.completed ? 'bg-indigo-600' : 'bg-green-500'} text-white px-3 py-2 rounded-lg font-semibold text-xs hover:opacity-90 transition">
              ${t.completed ? '↩️' : '✅'}
            </button>
            <button class="delete-btn flex-1 bg-red-500 text-white px-3 py-2 rounded-lg font-semibold text-xs hover:opacity-90 transition">
              🗑️
            </button>
          </div>
        `;

        card.querySelector('.complete-btn').addEventListener('click', async () => {
          try {
            await tasksRef.doc(t.id).update({ completed: !t.completed });
          } catch (err) {
            showToast('Error updating task');
          }
        });

        card.querySelector('.delete-btn').addEventListener('click', async () => {
          if(!confirm('Delete this task?')) return;
          try {
            await tasksRef.doc(t.id).delete();
          } catch (err) {
            showToast('Error deleting task');
          }
        });

        card.querySelector('.star-btn').addEventListener('click', async () => {
          try {
            await tasksRef.doc(t.id).update({ starred: !t.starred });
          } catch (err) {
            showToast('Error updating star');
          }
        });

        taskList.appendChild(card);
      });
    }
  </script>
</body>
</html>

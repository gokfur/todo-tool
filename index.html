<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taskly - A beautiful, mobile-friendly to-do list app with Firebase sync across all your devices">
  <meta property="og:title" content="Taskly - Beautiful To-Do List App">
  <meta property="og:description" content="Stay organized with Taskly - sync your tasks across all devices with offline support">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Taskly">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
  <title>Taskly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:'Inter',sans-serif;}
    button:focus, input:focus, select:focus, textarea:focus { outline: 2px solid #4f46e5; outline-offset: 2px; }
    ::selection { background: #4f46e5; color: white; }
    .filter-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-scroll { -ms-overflow-style: none; }
    .min-tap-target { min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; }
    * { box-sizing: border-box; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 0.3s ease-out;
    }
  </style>
</head>
<body class="bg-gray-50 antialiased" style="font-family: Inter, sans-serif;">
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
      <p class="text-gray-600 font-medium">Loading Taskly...</p>
    </div>
  </div>

  <!-- Offline Banner -->
  <div id="offline-banner" class="fixed top-0 left-0 right-0 bg-red-600 text-white text-center py-2 text-sm font-medium z-40 hidden">
    🔴 You're offline. Changes will sync when back online.
  </div>

  <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-20 right-2 left-2 sm:right-4 sm:left-auto z-50 space-y-2 max-w-xs"></div>
  <!-- Header -->
  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-3xl mx-auto px-4 py-3 sm:py-4">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div class="flex items-center justify-between gap-3">
          <h1 class="text-lg sm:text-xl font-bold">Taskly</h1>
          <div class="text-xs sm:text-sm font-semibold bg-white bg-opacity-20 px-2 py-1 sm:px-3 sm:py-1 rounded-full whitespace-nowrap" id="task-count">0 tasks</div>
        </div>
        <div class="flex items-center justify-end gap-2 sm:gap-3">
          <div id="user-info" class="items-center gap-2" style="display:none">
            <img id="user-pic" class="w-7 h-7 sm:w-8 sm:h-8 rounded-full" src="" alt="">
            <span id="user-name" class="font-medium text-xs sm:text-sm hidden sm:inline max-w-[100px] truncate"></span>
            <button id="sign-out" class="min-tap-target bg-white text-indigo-600 px-2 py-1 sm:px-3 sm:py-1 rounded-full text-xs sm:text-sm font-medium hover:bg-opacity-90 transition">Sign out</button>
          </div>
          <button id="sign-in" class="min-tap-target bg-white text-indigo-600 px-3 py-2 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-medium hover:bg-opacity-90 transition whitespace-nowrap">Sign in</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Motivational Message & Progress -->
  <div id="motivation-container" class="bg-white border-b border-gray-200 px-4 py-3 text-center hidden">
    <p id="motivation-text" class="text-xs sm:text-sm font-semibold text-indigo-600"></p>
  </div>
  <div id="progress-container" class="w-full h-2 bg-gray-300">
    <div id="progress-bar" class="h-2 bg-indigo-600 w-0 transition-all duration-500"></div>
  </div>

  <main class="max-w-3xl mx-auto px-3 sm:px-4 py-3 sm:py-4 space-y-3 sm:space-y-4">
    <!-- Tasks Loading -->
    <div id="tasks-loading" class="text-center py-8 hidden">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mx-auto mb-2"></div>
      <p class="text-gray-600 text-sm">Loading tasks...</p>
    </div>
    <!-- Search Bar -->
    <div class="sticky top-12 z-40 bg-gray-50 pb-2 sm:pb-3 -mx-3 sm:-mx-4 px-3 sm:px-4 pt-2 sm:pt-3">
      <input 
        type="text" 
        id="search-input" 
        placeholder="🔍 Search tasks..." 
        class="w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 placeholder-gray-600 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition"
        aria-label="Search tasks"
      />
    </div>

    <!-- Filter Pills -->
    <div class="filter-scroll flex gap-1.5 sm:gap-2 py-2 -mx-3 sm:-mx-4 px-3 sm:px-4 flex-nowrap" id="filter-container">
      <button class="filter-pill min-tap-target px-3 py-2 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-semibold whitespace-nowrap border-2 transition flex items-center gap-1" data-filter="all">
        All <span class="bg-indigo-100 text-indigo-700 rounded-full px-1.5 sm:px-2 py-0.5 text-xs" id="count-all">0</span>
      </button>
      <button class="filter-pill min-tap-target px-3 py-2 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-semibold whitespace-nowrap border-2 transition flex items-center gap-1" data-filter="today">
        ☀️ <span class="hidden sm:inline">Today</span> <span class="bg-gray-200 text-gray-700 rounded-full px-1.5 sm:px-2 py-0.5 text-xs" id="count-today">0</span>
      </button>
      <button class="filter-pill min-tap-target px-3 py-2 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-semibold whitespace-nowrap border-2 transition flex items-center gap-1" data-filter="starred">
        ⭐ <span class="hidden sm:inline">Star</span> <span class="bg-gray-200 text-gray-700 rounded-full px-1.5 sm:px-2 py-0.5 text-xs" id="count-starred">0</span>
      </button>
      <button class="filter-pill min-tap-target px-3 py-2 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-semibold whitespace-nowrap border-2 transition flex items-center gap-1" data-filter="completed">
        ✅ <span class="hidden sm:inline">Done</span> <span class="bg-gray-200 text-gray-700 rounded-full px-1.5 sm:px-2 py-0.5 text-xs" id="count-completed">0</span>
      </button>
      <button class="filter-pill min-tap-target px-3 py-2 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-semibold whitespace-nowrap border-2 transition flex items-center gap-1" data-filter="overdue">
        🔴 <span class="hidden sm:inline">Over</span> <span class="bg-red-100 text-red-700 rounded-full px-1.5 sm:px-2 py-0.5 text-xs" id="count-overdue">0</span>
      </button>
    </div>

    <!-- Add Task Form -->
    <form id="task-form" class="bg-white rounded-xl shadow-md p-3 sm:p-4 md:p-6 space-y-3 sm:space-y-4" role="form" aria-label="Add new task">
      <h2 class="text-base sm:text-lg font-semibold text-gray-900">Add New Task</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
        <!-- Task Title -->
        <div>
          <label for="text" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1.5">Task Title</label>
          <input 
            type="text" 
            id="text" 
            placeholder="What do you need to do?" 
            required 
            aria-required="true" 
            class="w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 placeholder-gray-600 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition"
          />
        </div>

        <!-- Category -->
        <div>
          <label for="category" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1.5">Category</label>
          <select id="category" class="w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition" aria-label="Task category">
            <option value="Work">💼 Work</option>
            <option value="Personal">🏠 Personal</option>
            <option value="Shopping">🛒 Shopping</option>
            <option value="Health">❤️ Health</option>
            <option value="Study">📚 Study</option>
            <option value="Finance">💰 Finance</option>
            <option value="Travel">✈️ Travel</option>
            <option value="Fitness">🏋️ Fitness</option>
            <option value="Family">👨‍👩‍👧 Family</option>
            <option value="Goals">🎯 Goals</option>
            <option value="__custom__">➕ Custom</option>
          </select>
        </div>
      </div>

      <!-- Custom Category (hidden by default) -->
      <input 
        type="text" 
        id="custom-category" 
        placeholder="Enter custom category name" 
        class="hidden w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 placeholder-gray-600 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition"
        aria-label="Custom category name"
      />

      <!-- Notes -->
      <div>
        <label for="notes" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1.5">Notes (optional)</label>
        <textarea 
          id="notes" 
          placeholder="Add details or notes..." 
          rows="2"
          class="w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 placeholder-gray-600 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition resize-none"
          aria-label="Task notes"
        ></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 sm:gap-4">
        <!-- Due Date -->
        <div>
          <label for="due" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1.5">Due Date</label>
          <input 
            type="date" 
            id="due" 
            class="w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition"
            aria-label="Due date"
          />
        </div>

        <!-- Priority -->
        <div>
          <label for="priority" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1.5">Priority</label>
          <select id="priority" class="w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition" aria-label="Priority level">
            <option value="low">🟢 Low</option>
            <option value="medium">🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>

        <!-- Sort Dropdown -->
        <div>
          <label for="sort" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1.5">Sort By</label>
          <select id="sort" class="w-full p-2.5 sm:p-3 border border-gray-300 rounded-lg text-sm sm:text-base text-gray-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition" aria-label="Sort tasks">
            <option value="newest">Newest</option>
            <option value="dueDate">Due Date</option>
            <option value="priority">Priority</option>
            <option value="alpha">A-Z</option>
          </select>
        </div>
      </div>

      <button 
        type="submit" 
        class="min-tap-target w-full bg-indigo-600 text-white py-2.5 sm:py-3 rounded-lg hover:bg-indigo-700 focus:bg-indigo-700 active:bg-indigo-800 transition font-semibold text-sm sm:text-base"
        aria-label="Add new task"
      >
        <span class="text-white">➕</span> Add Task
      </button>
    </form>

    <!-- Task List -->
    <div id="task-list" class="space-y-2 sm:space-y-3" role="region" aria-label="Task list"></div>

    <!-- Bulk Actions -->
    <div id="bulk-actions" class="hidden flex gap-2 sm:gap-3">
      <button id="complete-all" class="min-tap-target flex-1 bg-indigo-600 text-white py-2.5 sm:py-3 rounded-lg hover:bg-indigo-700 transition font-semibold text-xs sm:text-sm">✅ Complete All</button>
      <button id="clear-completed" class="min-tap-target flex-1 bg-red-600 text-white py-2.5 sm:py-3 rounded-lg hover:bg-red-700 transition font-semibold text-xs sm:text-sm">🗑️ Remove All Completed</button>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="text-center py-8 sm:py-12 hidden">
      <p class="text-3xl sm:text-4xl mb-2">📝</p>
      <p class="text-gray-600 text-base sm:text-lg font-medium">Ready to get organized?</p>
      <p class="text-gray-500 text-sm mt-1">Add your first task above to get started!</p>
    </div>
  </main>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase Config
    // SECURITY NOTE: Before going public, set up Firestore Security Rules to restrict access to authenticated users only
    // Example rules:
    // rules_version = '2';
    // service cloud.firestore {
    //   match /databases/{database}/documents {
    //     match /users/{userId}/{document=**} {
    //       allow read, write: if request.auth != null && request.auth.uid == userId;
    //     }
    //   }
    // }
    const firebaseConfig = {
      apiKey: "AIzaSyALBhEKZDpih5cYgvOiOqFswDSh-VKPP3k",
      authDomain: "todo-app-b16da.firebaseapp.com",
      projectId: "todo-app-b16da",
      storageBucket: "todo-app-b16da.firebasestorage.app",
      messagingSenderId: "576296289477",
      appId: "1:576296289477:web:8c9b0b3d009f3624cedcac"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    console.log('Firebase initialized successfully');
    
    // Set persistence to LOCAL (works better on mobile)
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(err => {
      console.warn('Could not set auth persistence:', err);
    });
    
    // Enable offline persistence
    db.enablePersistence().then(() => {
      console.log('Offline persistence enabled');
    }).catch(err => {
      if (err.code === 'failed-precondition') {
        console.warn('Persistence failed: multiple tabs open');
      } else if (err.code === 'unimplemented') {
        console.warn('Persistence is not available');
      }
    });

    // Handle redirect result for mobile sign-in
    auth.getRedirectResult().then(result => {
      if (result.user) {
        console.log('Redirect sign-in successful:', result.user.email);
      }
    }).catch(error => {
      if (error.code !== 'auth/no-redirect-result') {
        console.error('Redirect sign-in error:', error);
      }
    });

    // Detect mobile device
    function isMobile() {
      return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // DOM Elements
    const signInBtn = document.getElementById('sign-in');
    const signOutBtn = document.getElementById('sign-out');
    const userInfo = document.getElementById('user-info');
    const userPic = document.getElementById('user-pic');
    const userName = document.getElementById('user-name');
    const taskForm = document.getElementById('task-form');
    const taskList = document.getElementById('task-list');
    const progressBar = document.getElementById('progress-bar');
    const motivationContainer = document.getElementById('motivation-container');
    const motivationText = document.getElementById('motivation-text');
    const taskCount = document.getElementById('task-count');
    const categorySelect = document.getElementById('category');
    const customCategoryInput = document.getElementById('custom-category');
    const searchInput = document.getElementById('search-input');
    const sortSelect = document.getElementById('sort');
    const bulkActionsDiv = document.getElementById('bulk-actions');
    const completeAllBtn = document.getElementById('complete-all');
    const clearCompletedBtn = document.getElementById('clear-completed');
    const emptyState = document.getElementById('empty-state');
    const toastContainer = document.getElementById('toast-container');

    // Hide loading overlay immediately and guarantee it's gone
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.style.display = 'none';
    });

    // Fallback: hide after 2 seconds regardless
    setTimeout(() => {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('hidden');
        overlay.style.display = 'none';
      }
    }, 2000);

    let allTasks = [];
    let tasksRef;
    let currentFilter = 'all';
    let currentSort = 'newest';
    let isOnline = navigator.onLine;
    let isSaving = false;

    // Utility Functions
    function sanitizeInput(text) {
      return text.replace(/<[^>]*>/g, '').trim();
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      if (!container) return;
      
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-yellow-500',
        info: 'bg-blue-500'
      };
      
      const duration = type === 'error' ? 5000 : 3000;
      toast.className = `${colors[type]} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium animate-fade-in w-full sm:w-auto`;
      toast.textContent = message;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, duration);
    }

    function updateOnlineStatus() {
      isOnline = navigator.onLine;
      const banner = document.getElementById('offline-banner');
      if (banner) {
        banner.classList.toggle('hidden', isOnline);
      }
    }

    function formatDate(date) {
      if (!date) return '';
      const d = new Date(date.seconds * 1000);
      return d.toLocaleDateString();
    }

    // Category toggle
    categorySelect.addEventListener('change', () => {
      if (categorySelect.value === '__custom__') {
        customCategoryInput.classList.remove('hidden');
        customCategoryInput.focus();
      } else {
        customCategoryInput.classList.add('hidden');
      }
    });

    // Online/Offline detection
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Auth State
    auth.onAuthStateChanged(user => {
      console.log('Auth state changed. User:', user ? user.email : 'none');
      
      // Hide loading overlay safely
      const overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.style.display = 'none';
      
      const tasksLoadingEl = document.getElementById('tasks-loading');
      if (tasksLoadingEl) tasksLoadingEl.classList.add('hidden');
      
      if (user) {
        signInBtn.classList.add('hidden');
        userInfo.style.display = 'flex';
        userPic.src = user.photoURL || '';
        userName.textContent = user.displayName || 'User';
        tasksRef = db.collection('users').doc(user.uid).collection('tasks');
        
        const tasksLoadingDiv = document.getElementById('tasks-loading');
        if (tasksLoadingDiv) tasksLoadingDiv.classList.remove('hidden');
        
        tasksRef.onSnapshot(snapshot => {
          console.log('Tasks snapshot received, doc count:', snapshot.size);
          allTasks = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            allTasks.push({ id: doc.id, ...data });
          });
          
          const el = document.getElementById('tasks-loading');
          if (el) el.classList.add('hidden');
          renderTasks();
        }, error => {
          console.error('Firestore error:', error);
          const el = document.getElementById('tasks-loading');
          if (el) el.classList.add('hidden');
          showToast('Failed to load tasks. Please check your connection.', 'error');
        });
      } else {
        signInBtn.classList.remove('hidden');
        userInfo.style.display = 'none';
        taskList.innerHTML = '';
        allTasks = [];
        progressBar.style.width = '0';
        taskCount.textContent = '0 tasks';
        const el = document.getElementById('tasks-loading');
        if (el) el.classList.add('hidden');
      }
    });

    signInBtn.addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      
      try {
        if (isMobile()) {
          await auth.signInWithRedirect(provider);
        } else {
          await auth.signInWithPopup(provider);
        }
      } catch (error) {
        console.error('Sign-in error:', error);
        
        if (error.code === 'auth/popup-blocked' && !isMobile()) {
          // Fallback to redirect on desktop if popup blocked
          try {
            await auth.signInWithRedirect(provider);
          } catch (redirectError) {
            showToast('Sign-in failed. Please allow popups or try again.', 'error');
          }
        } else {
          let message = 'Sign-in failed. Please try again.';
          if (error.code === 'auth/network-request-failed') {
            message = 'Network error. Please check your connection.';
          } else if (error.code === 'auth/too-many-requests') {
            message = 'Too many sign-in attempts. Please wait and try again.';
          }
          showToast(message, 'error');
        }
      }
    });
    signOutBtn.addEventListener('click', () => auth.signOut());

    // Add Task
    taskForm.addEventListener('submit', async e => {
      e.preventDefault();
      
      if (!tasksRef) {
        showToast('Please sign in first to add tasks.', 'warning');
        return;
      }
      
      if (isSaving) {
        return; // Prevent duplicate submissions
      }
      
      const textInput = taskForm['text'].value.trim();
      if (!textInput || textInput.length === 0) {
        showToast('Please enter a task title.', 'warning');
        taskForm['text'].focus();
        return;
      }
      
      isSaving = true;
      const submitBtn = taskForm.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="text-white">⏳</span> Adding...';
      submitBtn.disabled = true;
      
      try {
        let category = categorySelect.value;
        if (category === '__custom__') {
          category = sanitizeInput(customCategoryInput.value);
          if (!category) {
            showToast('Please enter a custom category name.', 'warning');
            return;
          }
        }

        const data = {
          text: sanitizeInput(textInput),
          notes: sanitizeInput(document.getElementById('notes').value),
          category: category,
          due: taskForm['due'].value || null,
          priority: taskForm['priority'].value,
          completed: false,
          starred: false,
          created: firebase.firestore.FieldValue.serverTimestamp()
        };

        await tasksRef.add(data);
        taskForm.reset();
        customCategoryInput.classList.add('hidden');
        customCategoryInput.value = '';
        categorySelect.value = 'Work';
        document.getElementById('notes').value = '';
        document.getElementById('due').value = '';
        document.getElementById('priority').value = 'medium';
        document.getElementById('text').focus();
        showToast('Task added successfully!', 'success');
      } catch (error) {
        console.error('Error adding task:', error);
        showToast('Failed to add task. Please try again.', 'error');
      } finally {
        isSaving = false;
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    // Filter Buttons
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(b => {
          b.classList.remove('border-indigo-600', 'text-indigo-600', 'bg-indigo-50');
          b.classList.add('border-gray-300', 'text-gray-700', 'bg-white');
        });
        btn.classList.add('border-indigo-600', 'text-indigo-600', 'bg-indigo-50');
        btn.classList.remove('border-gray-300', 'text-gray-700', 'bg-white');
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });
    document.querySelector('[data-filter="all"]').classList.add('border-indigo-600', 'text-indigo-600', 'bg-indigo-50');
    document.querySelector('[data-filter="all"]').classList.remove('border-gray-300', 'text-gray-700', 'bg-white');

    // Sort
    sortSelect.addEventListener('change', (e) => {
      currentSort = e.target.value;
      renderTasks();
    });

    // Search
    searchInput.addEventListener('input', () => {
      renderTasks();
    });

    // Bulk Actions
    completeAllBtn.addEventListener('click', async () => {
      const filtered = getFilteredTasks();
      if (filtered.length === 0) {
        showToast('No tasks to complete.', 'info');
        return;
      }
      
      try {
        const batch = db.batch();
        filtered.forEach(t => {
          const ref = tasksRef.doc(t.id);
          batch.update(ref, { completed: true });
        });
        await batch.commit();
        showToast(`Completed ${filtered.length} task${filtered.length === 1 ? '' : 's'}!`, 'success');
      } catch (error) {
        console.error('Error completing tasks:', error);
        showToast('Failed to complete tasks. Please try again.', 'error');
      }
    });

    clearCompletedBtn.addEventListener('click', async () => {
      const filtered = getFilteredTasks().filter(t => t.completed);
      if (filtered.length === 0) {
        showToast('No completed tasks to remove.', 'info');
        return;
      }
      
      if (!confirm(`Delete ${filtered.length} completed task${filtered.length === 1 ? '' : 's'}? This cannot be undone.`)) {
        return;
      }
      
      try {
        const batch = db.batch();
        filtered.forEach(t => {
          const ref = tasksRef.doc(t.id);
          batch.delete(ref);
        });
        await batch.commit();
        showToast(`Removed ${filtered.length} completed task${filtered.length === 1 ? '' : 's'}.`, 'success');
      } catch (error) {
        console.error('Error removing tasks:', error);
        showToast('Failed to remove tasks. Please try again.', 'error');
      }
    });

    // Utility Functions
    function getToday() {
      const today = new Date();
      return today.toISOString().split('T')[0];
    }

    function isToday(dateStr) {
      return dateStr === getToday();
    }

    function isOverdue(dateStr, completed) {
      if (!dateStr || completed) return false;
      return dateStr < getToday();
    }

    function getFilteredTasks() {
      let filtered = [...allTasks];
      
      // Search filter
      const searchTerm = searchInput.value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(t => 
          t.text.toLowerCase().includes(searchTerm) || 
          (t.notes && t.notes.toLowerCase().includes(searchTerm))
        );
      }

      // Status filters
      if (currentFilter === 'today') {
        filtered = filtered.filter(t => !t.completed && t.due && isToday(t.due));
      } else if (currentFilter === 'starred') {
        filtered = filtered.filter(t => t.starred);
      } else if (currentFilter === 'completed') {
        filtered = filtered.filter(t => t.completed);
      } else if (currentFilter === 'overdue') {
        filtered = filtered.filter(t => isOverdue(t.due, t.completed));
      }

      return filtered;
    }

    function getSortedTasks(tasks) {
      const sorted = [...tasks];
      
      if (currentSort === 'dueDate') {
        sorted.sort((a, b) => {
          const aDate = a.due || '9999-12-31';
          const bDate = b.due || '9999-12-31';
          return aDate.localeCompare(bDate);
        });
      } else if (currentSort === 'priority') {
        const priorityOrder = { high: 0, medium: 1, low: 2 };
        sorted.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
      } else if (currentSort === 'alpha') {
        sorted.sort((a, b) => a.text.localeCompare(b.text));
      } else if (currentSort === 'newest') {
        sorted.sort((a, b) => (b.created || 0) - (a.created || 0));
      }

      return sorted;
    }

    function updateMotivation() {
      const completed = allTasks.filter(t => t.completed).length;
      const total = allTasks.length;
      
      if (total === 0) {
        motivationContainer.classList.add('hidden');
        return;
      }

      const pct = Math.round((completed / total) * 100);
      let message = '';

      if (pct === 0) {
        message = 'Let\'s get started! ✨';
      } else if (pct < 25) {
        message = 'Great beginning! 🚀';
      } else if (pct < 50) {
        message = 'You\'re halfway there! 💪';
      } else if (pct < 75) {
        message = 'Almost done! 🏃';
      } else if (pct < 100) {
        message = 'You\'re on fire! 🔥';
      } else {
        message = 'Perfect! All tasks done! 🎉';
      }

      motivationText.textContent = message + ` ${pct}% done`;
      motivationContainer.classList.remove('hidden');
    }

    function updateCounts() {
      const completed = allTasks.filter(t => t.completed).length;
      const today = allTasks.filter(t => !t.completed && t.due && isToday(t.due)).length;
      const starred = allTasks.filter(t => t.starred).length;
      const overdue = allTasks.filter(t => isOverdue(t.due, t.completed)).length;
      const total = allTasks.length;

      document.getElementById('count-all').textContent = total;
      document.getElementById('count-today').textContent = today;
      document.getElementById('count-starred').textContent = starred;
      document.getElementById('count-completed').textContent = completed;
      document.getElementById('count-overdue').textContent = overdue;

      taskCount.textContent = (total - completed) + ' task' + (total - completed === 1 ? '' : 's');
    }

    function renderTasks() {
      taskList.innerHTML = '';
      updateCounts();
      updateMotivation();

      const filtered = getFilteredTasks();
      const sorted = getSortedTasks(filtered);
      const completed = allTasks.filter(t => t.completed).length;
      const total = allTasks.length;
      const pct = total ? Math.round((completed / total) * 100) : 0;

      progressBar.style.width = pct + '%';

      const hasFilteredTasks = filtered.length > 0;
      const hasCompletedInFiltered = filtered.some(t => t.completed);
      const showBulkActions = hasFilteredTasks && (hasCompletedInFiltered || filtered.some(t => !t.completed));
      bulkActionsDiv.classList.toggle('hidden', !showBulkActions);

      if (sorted.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');

      sorted.forEach(t => {
        const priEmoji = t.priority === 'high' ? '🔴' : t.priority === 'medium' ? '🟡' : '🟢';
        const priColor = t.priority === 'high' ? 'text-red-600' : t.priority === 'medium' ? 'text-amber-600' : 'text-green-600';
        let borderClass = 'border-gray-200';
        
        if (isOverdue(t.due, t.completed)) {
          borderClass = 'border-red-400';
        } else if (!t.completed && t.due && isToday(t.due)) {
          borderClass = 'border-amber-400';
        }

        const card = document.createElement('div');
        card.className = `rounded-lg shadow-md p-3 sm:p-4 bg-white border-2 ${borderClass} transition hover:shadow-lg ${t.completed ? 'opacity-75' : ''}`;
        
        card.innerHTML = `
          <div class="flex justify-between items-start gap-2 mb-2 sm:mb-3">
            <div class="flex items-start gap-2 flex-1 min-w-0">
              <span class="${priColor} text-base sm:text-lg flex-shrink-0" aria-label="Priority: ${t.priority}" role="img">${priEmoji}</span>
              <div class="flex-1 min-w-0">
                <p class="font-semibold text-gray-900 ${t.completed ? 'line-through opacity-50' : ''} text-sm sm:text-base break-words">${t.text}</p>
                ${t.notes ? `<p class="text-xs sm:text-sm text-gray-600 mt-1 break-words">${t.notes}</p>` : ''}
              </div>
            </div>
            <button class="star-btn min-tap-target flex-shrink-0 text-xl sm:text-2xl hover:scale-125 transition" data-id="${t.id}" aria-label="${t.starred ? 'Unstar' : 'Star'} task">
              ${t.starred ? '⭐' : '☆'}
            </button>
          </div>
          
          <div class="flex flex-wrap items-center gap-1.5 sm:gap-2 mb-3 sm:mb-4">
            <span class="text-gray-800 text-xs font-semibold px-2 sm:px-3 py-1 bg-gray-100 rounded-full">${t.category}</span>
            <span class="text-gray-600 text-xs">📅 ${t.due ? t.due : 'No date'}</span>
            <span class="text-gray-500 text-xs">📝 ${formatDate(t.created)}</span>
          </div>

          <div class="flex gap-2">
            <button class="complete-btn min-tap-target flex-1 ${t.completed ? 'bg-indigo-600' : 'bg-indigo-500'} text-white py-2 rounded-lg hover:${t.completed ? 'bg-indigo-700' : 'bg-indigo-600'} transition font-medium text-xs sm:text-sm" aria-label="${t.completed ? 'Mark incomplete' : 'Mark complete'}">
              ${t.completed ? '↩️ Undo' : '✅ Complete'}
            </button>
            <button class="delete-btn min-tap-target flex-1 bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 transition font-medium text-xs sm:text-sm" aria-label="Remove task">
              🗑️ Remove
            </button>
          </div>
        `;

        taskList.appendChild(card);

        card.querySelector('.complete-btn').addEventListener('click', async () => {
          try {
            await tasksRef.doc(t.id).update({ completed: !t.completed });
            showToast(t.completed ? 'Task marked incomplete.' : 'Task completed!', 'success');
          } catch (error) {
            console.error('Error updating task:', error);
            showToast('Failed to update task. Please try again.', 'error');
          }
        });

        card.querySelector('.delete-btn').addEventListener('click', async () => {
          if (!confirm('Delete this task? This cannot be undone.')) {
            return;
          }
          
          try {
            await tasksRef.doc(t.id).delete();
            showToast('Task deleted.', 'success');
          } catch (error) {
            console.error('Error deleting task:', error);
            showToast('Failed to delete task. Please try again.', 'error');
          }
        });

        card.querySelector('.star-btn').addEventListener('click', async () => {
          try {
            await tasksRef.doc(t.id).update({ starred: !t.starred });
            showToast(t.starred ? 'Task unstarred.' : 'Task starred!', 'success');
          } catch (error) {
            console.error('Error updating star:', error);
            showToast('Failed to update task. Please try again.', 'error');
          }
        });
      });
    }
  </script>
</body>
</html>

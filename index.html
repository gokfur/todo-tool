<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #task-form {
            display: flex;
            margin-bottom: 20px;
        }
        #task-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        button {
            padding: 10px 15px;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        li.completed {
            text-decoration: line-through;
            color: #888;
        }
        .task-text {
            flex: 1;
            cursor: pointer;
        }
        .delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <form id="task-form">
            <input type="text" id="task-input" placeholder="Add a new task" required>
            <button type="submit">Add Task</button>
        </form>
        <ul id="task-list"></ul>
    </div>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        // initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyALBhEKZDpih5cYgvOiOqFswDSh-VKPP3k",
            authDomain: "todo-app-b16da.firebaseapp.com",
            projectId: "todo-app-b16da",
            storageBucket: "todo-app-b16da.firebasestorage.app",
            messagingSenderId: "576296289477",
            appId: "1:576296289477:web:8c9b0b3d009f3624cedcac"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tasksCol = db.collection('tasks');

        const taskForm = document.getElementById('task-form');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');

        // render function uses array of task objects with id, text, completed
        function renderTasks(tasks) {
            taskList.innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = task.completed ? 'completed' : '';
                li.innerHTML = `
                    <span class="task-text" data-id="${task.id}" data-completed="${task.completed}">${task.text}</span>
                    <button class="delete-btn" data-id="${task.id}">Delete</button>
                `;
                taskList.appendChild(li);
            });
        }

        // listen for realtime updates
        tasksCol.onSnapshot(snapshot => {
            const tasks = [];
            snapshot.forEach(doc => {
                tasks.push({ id: doc.id, ...doc.data() });
            });
            renderTasks(tasks);
        });

        taskForm.addEventListener('submit', e => {
            e.preventDefault();
            const taskText = taskInput.value.trim();
            if (taskText) {
                tasksCol.add({ text: taskText, completed: false });
                taskInput.value = '';
            }
        });

        taskList.addEventListener('click', e => {
            const id = e.target.dataset.id;
            if (!id) return;

            if (e.target.classList.contains('task-text')) {
                const completed = e.target.dataset.completed === 'true';
                tasksCol.doc(id).update({ completed: !completed });
            } else if (e.target.classList.contains('delete-btn')) {
                tasksCol.doc(id).delete();
            }
        });
    </script>
</body>
</html>
